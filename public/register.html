<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - Akıllı Seyahat</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .kutu { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        a { color: #17a2b8; text-decoration: none; font-size: 14px; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="kutu">
        <h2>Kayıt Ol</h2>
        <input type="text" id="kullanici_adi" placeholder="Kullanıcı Adı">
        <input type="password" id="sifre" placeholder="Şifre">
        <button onclick="kayitOl()">Kayıt Ol</button>
        <a href="login.html">Zaten hesabın var mı? Giriş Yap</a>
    </div>

    <script>
        async function kayitOl() {
            const kullanici_adi = document.getElementById('kullanici_adi').value;
            const sifre = document.getElementById('sifre').value;

            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ kullanici_adi, sifre })
            });

            const data = await response.json();
            if (response.ok) {
                alert('Kayıt başarılı! Lütfen giriş yapın.');
                window.location.href = 'login.html'; // Giriş sayfasına yönlendir
            } else {
                alert(data.error || data.hata);
            }
        }
    </script>
</body>
</html>
